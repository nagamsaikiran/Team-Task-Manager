<div class="min-h-screen bg-slate-800 flex items-center justify-center">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="text-white font-bold text-xl">Task Manager</span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-lg shadow-xl p-8">
      <h1 class="text-xl font-semibold text-gray-800 mb-1">Create your account</h1>
      <p class="text-sm text-gray-400 mb-6">Get started for free</p>

      <div *ngIf="error" class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md p-3">
        {{ error }}
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
        <input [(ngModel)]="name" type="text" placeholder="Your name"
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input [(ngModel)]="email" type="email" placeholder="you@example.com"
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input [(ngModel)]="password" type="password" placeholder="Min 6 characters"
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
      </div>

      <button (click)="submit()" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2.5 rounded-md text-sm font-medium hover:bg-blue-700 disabled:opacity-50 transition-colors">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>

      <p class="mt-5 text-sm text-gray-500 text-center">
        Already have an account?
        <a routerLink="/login" class="text-blue-600 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</div>
