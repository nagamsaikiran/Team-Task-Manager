<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white p-8 rounded border border-gray-200 w-full max-w-sm">
    <h1 class="text-xl font-semibold text-gray-800 mb-6">Sign in</h1>

    <div *ngIf="error" class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded p-3">{{ error }}</div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Email</label>
      <input [(ngModel)]="email" type="email" placeholder="you@example.com"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
    </div>

    <div class="mb-6">
      <label class="block text-sm text-gray-600 mb-1">Password</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••"
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
    </div>

    <button (click)="submit()" [disabled]="loading"
      class="w-full bg-blue-600 text-white py-2 rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50">
      {{ loading ? 'Signing in...' : 'Sign in' }}
    </button>

    <p class="mt-4 text-sm text-gray-500 text-center">
      Don't have an account? <a routerLink="/signup" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </div>
</div>
