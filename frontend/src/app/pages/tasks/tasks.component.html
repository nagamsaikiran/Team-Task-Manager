<div class="max-w-4xl mx-auto px-6 py-8">
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">My Tasks</h1>

  <!-- Filter Tabs -->
  <div class="flex gap-4 mb-6 border-b border-gray-200">
    <button *ngFor="let f of [{val:'all',label:'All'},{val:'todo',label:'To Do'},{val:'in_progress',label:'In Progress'},{val:'done',label:'Done'}]"
      (click)="filter = f.val"
      class="pb-2 text-sm border-b-2 transition-colors"
      [class.border-blue-600]="filter === f.val"
      [class.text-blue-600]="filter === f.val"
      [class.border-transparent]="filter !== f.val"
      [class.text-gray-500]="filter !== f.val">
      {{ f.label }}
    </button>
  </div>

  <div *ngIf="loading" class="text-sm text-gray-400">Loading...</div>
  <div *ngIf="!loading && filtered.length === 0" class="text-sm text-gray-400">No tasks found.</div>

  <div class="space-y-2">
    <div *ngFor="let task of filtered" class="bg-white border border-gray-200 rounded px-4 py-3">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-sm font-medium text-gray-800">{{ task.title }}</p>
          <p *ngIf="task.description" class="text-xs text-gray-400 mt-1">{{ task.description }}</p>
          <span *ngIf="task.due_date" class="text-xs text-gray-400 mt-1 block">Due {{ task.due_date }}</span>
        </div>
        <select [value]="task.status" (change)="updateStatus(task, $any($event.target).value)"
          class="text-xs border border-gray-200 rounded px-2 py-1 focus:outline-none">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
  </div>
</div>
