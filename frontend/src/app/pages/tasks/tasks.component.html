<div class="p-8">

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-800">My Tasks</h1>
    <p class="text-sm text-gray-500 mt-1">All tasks assigned to you</p>
  </div>

  <!-- Filter Tabs -->
  <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg w-fit">
    <button *ngFor="let f of [{val:'all',label:'All'},{val:'todo',label:'To Do'},{val:'in_progress',label:'In Progress'},{val:'done',label:'Done'}]"
      (click)="filter = f.val"
      class="px-4 py-1.5 text-sm rounded-md transition-colors font-medium"
      [class.bg-white]="filter === f.val"
      [class.text-gray-800]="filter === f.val"
      [class.shadow-sm]="filter === f.val"
      [class.text-gray-500]="filter !== f.val">
      {{ f.label }}
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-sm text-gray-400">Loading...</div>

  <!-- Empty state -->
  <div *ngIf="!loading && filtered.length === 0" class="bg-white rounded-lg shadow-sm border border-gray-200 p-12 text-center">
    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2m-6 9l2 2 4-4" />
      </svg>
    </div>
    <p class="text-gray-500 text-sm">No tasks found.</p>
  </div>

  <!-- Tasks List -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 divide-y divide-gray-50" *ngIf="!loading && filtered.length > 0">
    <div *ngFor="let task of filtered" class="px-5 py-4 hover:bg-gray-50 transition-colors">
      <div class="flex justify-between items-start gap-4">
        <div class="flex items-start gap-3 flex-1 min-w-0">
          <div class="w-1.5 h-1.5 rounded-full mt-2 flex-shrink-0"
            [class.bg-gray-400]="task.status === 'todo'"
            [class.bg-blue-500]="task.status === 'in_progress'"
            [class.bg-green-500]="task.status === 'done'">
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-800">{{ task.title }}</p>
            <p *ngIf="task.description" class="text-xs text-gray-400 mt-0.5">{{ task.description }}</p>
            <p *ngIf="task.due_date" class="text-xs text-gray-400 mt-1">Due {{ task.due_date }}</p>
          </div>
        </div>
        <select [value]="task.status" (change)="updateStatus(task, $any($event.target).value)"
          class="text-xs border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white flex-shrink-0">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
  </div>

</div>
