<aside class="w-56 bg-slate-800 flex flex-col h-screen fixed top-0 left-0 z-10">

  <!-- Logo -->
  <div class="px-5 py-4 border-b border-slate-700">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 bg-blue-500 rounded flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="text-white font-semibold text-sm">Task Manager</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-4 space-y-1">

    <a routerLink="/dashboard" routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      Dashboard
    </a>

    <a routerLink="/projects" routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
      </svg>
      Projects
    </a>

    <a routerLink="/tasks" routerLinkActive="bg-blue-600 text-white"
      class="flex items-center gap-3 px-3 py-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
      </svg>
      My Tasks
    </a>

  </nav>

  <!-- User Profile -->
  <div class="px-3 py-4 border-t border-slate-700">
    <div class="flex items-center gap-3 px-3 py-2">
      <div class="w-7 h-7 bg-blue-500 rounded-full flex items-center justify-center text-white font-semibold text-xs flex-shrink-0">
        {{ userInitial }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm text-white truncate">{{ auth.getCurrentUser()?.name }}</p>
        <p class="text-xs text-slate-400 truncate">{{ auth.getCurrentUser()?.email }}</p>
      </div>
    </div>
    <button (click)="auth.logout()"
      class="w-full mt-2 flex items-center gap-2 px-3 py-2 rounded text-slate-400 hover:bg-slate-700 hover:text-red-400 text-xs transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sign out
    </button>
  </div>

</aside>

<!-- Spacer so content doesn't hide behind sidebar -->
<div class="w-56 flex-shrink-0"></div>
